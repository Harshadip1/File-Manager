<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>NexusCloud — File Sharing</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head>
<body>
<div class="particles" id="particles"></div><div class="sidebar-overlay"></div>
<div class="app-layout">
<aside class="sidebar"><div class="sidebar-logo"><div class="logo-icon">☁️</div><h1>NexusCloud</h1></div><nav class="sidebar-nav" id="sidebar-nav"></nav></aside>
<main class="main-content">
<header class="top-header"><button class="menu-toggle">☰</button><div class="header-actions" style="margin-left:auto"><button class="btn btn-icon" data-theme-toggle>🌙</button></div></header>
<div class="page-content">
<div class="page-header reveal"><h2>🤝 File Sharing</h2><p>Create share links, manage permissions & QR codes</p></div>
<div class="grid-2 reveal">
<div class="glass-card"><h3>Share Link</h3><input type="text" readonly value="https://cloud.demo/share/abc123xyz" style="width:100%;padding:0.75rem;margin:1rem 0;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-md);color:inherit"><button class="btn btn-primary">Copy Link</button></div>
<div class="glass-card" style="text-align:center"><h3>QR Code Share</h3><div style="width:160px;height:160px;background:var(--bg-tertiary);margin:1rem auto;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:3rem">▦</div><p style="font-size:0.85rem;color:var(--text-muted)">Scan to access shared files</p></div>
</div>
<div class="glass-card reveal" style="margin-top:2rem"><h3>Version History</h3><table class="data-table" style="margin-top:1rem"><thead><tr><th>Version</th><th>File</th><th>Modified</th><th>Size</th><th>By</th></tr></thead><tbody id="versions"></tbody></table></div>
<div class="glass-card reveal" style="margin-top:2rem"><h3>Archive System</h3><div class="files-grid" id="archives"></div></div>
</div></main></div>
<script src="js/data.js"></script><script src="js/files.js"></script><script src="js/storage.js"></script><script src="js/themes.js"></script><script src="js/app.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{
document.getElementById('versions').innerHTML=Array(25).fill(0).map((_,i)=>{const f=NexusData.files[i];return`<tr><td>v${25-i}</td><td>${f.name}</td><td>${NexusApp.formatDate(f.modified)}</td><td>${f.sizeFormatted}</td><td>${f.owner}</td></tr>`;}).join('');
NexusFiles.renderGrid(document.getElementById('archives'),NexusData.files.filter(f=>f.type==='zip'),20);});</script>
</body></html>
