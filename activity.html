<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>NexusCloud — Activity Logs</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head>
<body>
<div class="particles" id="particles"></div><div class="sidebar-overlay"></div>
<div class="app-layout">
<aside class="sidebar"><div class="sidebar-logo"><div class="logo-icon">☁️</div><h1>NexusCloud</h1></div><nav class="sidebar-nav" id="sidebar-nav"></nav></aside>
<main class="main-content">
<header class="top-header"><button class="menu-toggle">☰</button><div class="search-bar"><input placeholder="Filter activity..."></div><div class="header-actions"><button class="btn btn-icon" data-theme-toggle>🌙</button></div></header>
<div class="page-content">
<div class="page-header reveal"><h2>📋 Activity Logs</h2><p>180 activity records — full audit trail</p></div>
<div class="data-table-wrap reveal"><table class="data-table"><thead><tr><th>User</th><th>Action</th><th>Target</th><th>IP</th><th>Device</th><th>Time</th></tr></thead><tbody id="activity-body"></tbody></table></div>
<div class="timeline reveal" id="activity-timeline" style="margin-top:2rem"></div>
</div></main></div>
<script src="js/data.js"></script><script src="js/storage.js"></script><script src="js/themes.js"></script><script src="js/app.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{
document.getElementById('activity-body').innerHTML=NexusData.activities.map(a=>`<tr><td>${a.user}</td><td>${a.action}</td><td>${a.target}</td><td>${a.ip}</td><td>${a.device}</td><td>${NexusApp.formatDate(a.time)}</td></tr>`).join('');
document.getElementById('activity-timeline').innerHTML=NexusData.activities.slice(0,40).map(a=>`<div class="timeline-item"><p><strong>${a.user}</strong> ${a.action} ${a.target}</p><time>${NexusApp.formatDate(a.time)} • ${a.device}</time></div>`).join('');});</script>
</body></html>
